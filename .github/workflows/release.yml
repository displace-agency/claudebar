name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build .app
        run: ./scripts/build-app.sh ${{ steps.ver.outputs.version }}

      - name: Build DMG
        run: ./scripts/build-dmg.sh ${{ steps.ver.outputs.version }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeBar-${{ steps.ver.outputs.version }}.dmg
          generate_release_notes: true

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeBar-${{ steps.ver.outputs.version }}
          path: build/ClaudeBar-${{ steps.ver.outputs.version }}.dmg
